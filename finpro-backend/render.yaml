# render.yaml — Configuración para Render.com
services:
  - type: web
    name: finpro-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: finpro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: finpro-db
    databaseName: finpro
    user: finpro
    plan: free
